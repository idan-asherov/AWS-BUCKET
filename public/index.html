<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S3 Image Uploader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="upload-container">
      <h2>S3 Image Uploader</h2>

      <form id="uploadForm">
        <div class="form-group">
          <label for="description">Description</label>
          <input
            type="text"
            id="description"
            placeholder="Enter a cool caption..."
            required
          />
        </div>

        <div class="form-group">
          <label for="imageFile">Select Image</label>
          <input
            type="file"
            id="imageFile"
            name="image"
            accept="image/*"
            required
          />
        </div>

        <button type="submit" id="submitBtn">Upload to S3</button>
      </form>

      <div id="statusMessage"></div>

      <hr style="margin-top: 30px; border: 0; border-top: 1px solid #eee" />
      <h3 style="text-align: center; color: #333; margin-top: 20px">
        Live Bucket Contents
      </h3>
      <div
        id="gallery"
        style="
          margin-top: 15px;
          display: flex;
          flex-direction: column;
          gap: 15px;
        "
      ></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
